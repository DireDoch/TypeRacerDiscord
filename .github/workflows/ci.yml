# CI : tests + builds des deux moitiés, en parallèle, sur push et PR vers main.
# Le build Vite attrape les erreurs TypeScript hors des fichiers testés par vitest.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
